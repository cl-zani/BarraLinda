<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Barra Linda</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .header-map { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-map">🗺️ Mapa de Ocorrências</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. COLOQUE O SEU LINK DO CLOUDFLARE AQUI TAMBÉM:
        const API_URL = 'https://COLE-SEU-LINK-AQUI.trycloudflare.com';

        const map = L.map('map').setView([-18.573, -39.732], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function carregarMarcadores() {
            try {
                const res = await fetch(`${API_URL}/api/collections/ocorrencias/records`);
                const dados = await res.json();

                dados.items.forEach(oc => {
                    const fotoUrl = `${API_URL}/api/files/${oc.collectionId}/${oc.id}/${oc.foto}`;
                    
                    L.marker([oc.latitude, oc.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <div style="width: 200px">
                                <strong>${oc.tags || 'Relato'}</strong><br>
                                <p>${oc.texto}</p>
                                <img src="${fotoUrl}" style="width: 100%; border-radius: 5px">
                                <br><small>Status: ${oc.status}</small>
                            </div>
                        `);
                });
            } catch (err) {
                console.error("Erro ao carregar mapa", err);
            }
        }

        carregarMarcadores();
    </script>
</body>
</html>
