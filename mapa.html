<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard BarraLinda - Mapa e Estatísticas</title>
    
    <!-- Leaflet e Plugins -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; color: #333; }
        .header { background: #1b5e20; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar lateral */
        .sidebar { width: 380px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1001; }
        #map { flex: 1; z-index: 1; }

        .section { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        h3 { font-size: 14px; color: #666; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }

        /* Filtros e Botões */
        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; cursor: pointer; }
        .checkbox-item input { margin-right: 12px; transform: scale(1.2); }
        .btn-toggle { width: 100%; padding: 10px; background: #2196f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        
        /* Ranking */
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px dashed #eee; }
        .ranking-count { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        /* Gráficos */
        canvas { max-width: 100%; margin-top: 10px; }

        .popup-img { width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; }

        /* Cores das Legendas */
        .legenda-cor { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            #map { min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏛️ Painel Barra Linda</h2>
        <div id="clock" style="font-size: 12px; opacity: 0.8;"></div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            
            <div class="section">
                <h3>🛠️ Visualização</h3>
                <button class="btn-toggle" id="btnHeatmap">🔥 Ativar Mapa de Calor</button>
                <button class="btn-toggle" style="background: #4caf50;" id="btnRefresh">🔄 Atualizar Dados</button>
            </div>

            <div class="section">
                <h3>🔍 Categorias</h3>
                <div id="filterContainer">
                    <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="reclamacao"> <span class="legenda-cor" style="background:#ff5252"></span> 👎 Reclamação</label>
                    <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="sugestao"> <span class="legenda-cor" style="background:#ffb300"></span> 💡 Sugestão</label>
                    <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="elogio"> <span class="legenda-cor" style="background:#4caf50"></span> 👍 Elogio</label>
                </div>
            </div>

            <div class="section">
                <h3>🏆 Resumo por Tipo</h3>
                <div id="rankingList">Carregando...</div>
            </div>

            <div class="section">
                <h3>📈 Eficácia (Resolvidos)</h3>
                <canvas id="chartStatus"></canvas>
            </div>

            <div class="section">
                <h3>📅 Novos Relatos (7 dias)</h3>
                <canvas id="chartTimeline"></canvas>
            </div>

        </aside>

        <main id="map"></main>
    </div>

    <script>
        // ================================================================
        // 1. ATUALIZE O LINK DO CLOUDFLARE AQUI:
        const API_URL = 'https://awarded-scientists-simpson-sen.trycloudflare.com';
        // ================================================================

        let map, chartStatus, chartTimeline, heatLayer;
        let todasOcorrencias = [];
        let camadaMarcadores = L.layerGroup();
        let modoHeatmap = false;

        function init() {
            map = L.map('map').setView([-18.573, -39.732], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            camadaMarcadores.addTo(map);
            carregarDados();
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${API_URL}/api/collections/ocorrencias/records?sort=-created`);
                const data = await res.json();
                todasOcorrencias = data.items;
                atualizarTudo();
            } catch (e) { 
                console.error("Erro ao conectar:", e);
                alert("Erro ao conectar com o servidor local. Verifique o link do Cloudflare."); 
            }
        }

        function atualizarTudo() {
            renderizarMapa();
            renderizarGraficos();
            renderizarRanking();
        }

        function getCor(tag) {
            if (tag === 'reclamacao') return '#ff5252';
            if (tag === 'sugestao') return '#ffb300';
            if (tag === 'elogio') return '#4caf50';
            return '#9e9e9e';
        }

        function renderizarMapa() {
            camadaMarcadores.clearLayers();
            if (heatLayer) map.removeLayer(heatLayer);

            const tagsAtivas = Array.from(document.querySelectorAll('.filter-check:checked')).map(cb => cb.value);
            const dadosFiltrados = todasOcorrencias.filter(oc => tagsAtivas.includes(oc.tags));

            if (modoHeatmap) {
                const pontosCalor = dadosFiltrados.map(oc => [oc.latitude, oc.longitude, 0.5]);
                heatLayer = L.heatLayer(pontosCalor, {radius: 25, blur: 15, max: 1.0}).addTo(map);
            } else {
                dadosFiltrados.forEach(oc => {
                    const cor = getCor(oc.tags);
                    const fotoUrl = `${API_URL}/api/files/${oc.collectionId}/${oc.id}/${oc.foto}`;
                    
                    const marker = L.circleMarker([oc.latitude, oc.longitude], {
                        radius: 9, fillOpacity: 0.9, color: 'white', weight: 2, fillColor: cor
                    });

                    const labelTag = oc.tags.charAt(0).toUpperCase() + oc.tags.slice(1);

                    marker.bindPopup(`
                        <div style="width:210px; font-family: sans-serif;">
                            <b style="color:${cor}; font-size: 14px;">${labelTag.toUpperCase()}</b><br>
                            <small style="color: #666;">${new Date(oc.created).toLocaleString()}</small>
                            <p style="margin:8px 0; font-size: 13px; line-height: 1.4;">${oc.texto}</p>
                            <img src="${fotoUrl}" class="popup-img" onclick="window.open('${fotoUrl}')" title="Clique para ampliar">
                            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
                            <small>Status: <b style="text-transform: uppercase;">${oc.status}</b></small>
                        </div>
                    `);
                    camadaMarcadores.addLayer(marker);
                });
            }
        }

        function renderizarRanking() {
            const contagem = { reclamacao: 0, sugestao: 0, elogio: 0 };
            todasOcorrencias.forEach(oc => {
                if(contagem[oc.tags] !== undefined) contagem[oc.tags]++;
            });
            
            const labels = { reclamacao: "👎 Reclamações", sugestao: "💡 Sugestões", elogio: "👍 Elogios" };

            document.getElementById('rankingList').innerHTML = Object.keys(contagem).map(key => `
                <div class="ranking-item">
                    <span>${labels[key]}</span>
                    <span class="ranking-count" style="background: ${getCor(key)}22; color: ${getCor(key)}">${contagem[key]}</span>
                </div>
            `).join('');
        }

        function renderizarGraficos() {
            // 1. Gráfico de Status (Eficácia)
            const resolvidos = todasOcorrencias.filter(o => o.status === 'resolvido').length;
            const pendentes = todasOcorrencias.length - resolvidos;

            if (chartStatus) chartStatus.destroy();
            chartStatus = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Resolvido', 'Pendente'],
                    datasets: [{ 
                        data: [resolvidos, pendentes], 
                        backgroundColor: ['#2e7d32', '#ff5252'],
                        borderWidth: 0 
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            // 2. Gráfico de Linha (Timeline)
            const dias = {};
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate()-i);
                dias[d.toLocaleDateString('pt-BR').slice(0,5)] = 0;
            }
            todasOcorrencias.forEach(oc => {
                const dataOc = new Date(oc.created).toLocaleDateString('pt-BR').slice(0,5);
                if(dias[dataOc] !== undefined) dias[dataOc]++;
            });

            if (chartTimeline) chartTimeline.destroy();
            chartTimeline = new Chart(document.getElementById('chartTimeline'), {
                type: 'line',
                data: {
                    labels: Object.keys(dias),
                    datasets: [{ 
                        label: 'Relatos', 
                        data: Object.values(dias), 
                        borderColor: '#1b5e20', 
                        backgroundColor: 'rgba(27,94,32,0.1)',
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        // Eventos de Interface
        document.getElementById('btnHeatmap').onclick = function() {
            modoHeatmap = !modoHeatmap;
            this.innerText = modoHeatmap ? "📍 Mostrar Pontos" : "🔥 Ativar Mapa de Calor";
            renderizarMapa();
        };

        document.getElementById('btnRefresh').onclick = carregarDados;
        document.querySelectorAll('.filter-check').forEach(c => c.onchange = renderizarMapa);

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); }, 1000);

        init();
    </script>
</body>
</html>
