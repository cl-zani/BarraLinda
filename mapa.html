<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Barra Linda - Versão Estabilidade</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Plugin de Calor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        .header { background: #1b5e20; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1001; }
        #map { flex: 1; z-index: 1; background: #e5e3df; }
        .section { margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        h3 { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .btn-toggle { width: 100%; padding: 12px; background: #2196f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
        .ranking-count { background: #eee; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        canvas { max-width: 100%; }
        /* CSS para o Mapa de Calor aparecer no Pentium Gold */
        .leaflet-heatmap-layer { 
            opacity: 1 !important; 
            z-index: 999 !important; 
            mix-blend-mode: multiply; /* Melhora a visualização em mapas claros */
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏛️ Barra Linda - Gestão</h2>
        <div id="clock"></div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <div class="section">
                <h3>Visualização</h3>
                <button class="btn-toggle" id="btnHeatmap">🔥 Ativar Mapa de Calor</button>
                <button class="btn-toggle" style="background: #4caf50;" id="btnRefresh">🔄 Atualizar Dados</button>
            </div>

            <div class="section">
                <h3>Categorias</h3>
                <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="reclamacao"> 👎 Reclamação</label>
                <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="sugestao"> 💡 Sugestão</label>
                <label class="checkbox-item"><input type="checkbox" checked class="filter-check" value="elogio"> 👍 Elogio</label>
            </div>

            <div class="section">
                <h3>Resumo</h3>
                <div id="rankingList"></div>
            </div>

            <div class="section">
                <canvas id="chartStatus"></canvas>
            </div>
        </aside>

        <main id="map"></main>
    </div>

    <script>
        // ==========================================================
        // PATCH DE HARDWARE: Resolve o erro "willReadFrequently"
        // Isso força o navegador a processar o calor na RAM.
        // ==========================================================
        (function() {
            const originalGetContext = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attributes) {
                if (type === '2d') {
                    attributes = attributes || {};
                    attributes.willReadFrequently = true;
                }
                return originalGetContext.call(this, type, attributes);
            };
        })();

        const API_URL = CONFIG.API_URL;
        let map, heatLayer, chartStatus;
        let todasOcorrencias = [];
        let camadaMarcadores = L.layerGroup();
        let modoHeatmap = false;

        function init() {
            // preferCanvas: true ajuda no desempenho de hardware fraco
            map = L.map('map', { preferCanvas: true }).setView([-18.573, -39.732], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            camadaMarcadores.addTo(map);
            carregarDados();
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${API_URL}/api/collections/ocorrencias/records?filter=(visivel=true)&perPage=200`);
                const data = await res.json();
                todasOcorrencias = data.items;
                atualizarPainel();
            } catch (e) { console.error("Erro Pocketbase:", e); }
        }

        function atualizarPainel() {
            renderizarMapa();
            renderizarRanking();
            renderizarGrafico();
        }

        function renderizarMapa() {
            camadaMarcadores.clearLayers();
            if (heatLayer) map.removeLayer(heatLayer);

            const tagsAtivas = Array.from(document.querySelectorAll('.filter-check:checked')).map(cb => cb.value);
            const filtrados = todasOcorrencias.filter(oc => tagsAtivas.includes(oc.tags));

            if (modoHeatmap) {
                // Prepara pontos para o calor com intensidade forte
                const pontos = filtrados.map(oc => [
                    parseFloat(oc.latitude), 
                    parseFloat(oc.longitude), 
                    1.0
                ]).filter(p => !isNaN(p[0]) && !isNaN(p[1]));

                if (pontos.length > 0) {
                    heatLayer = L.heatLayer(pontos, {
                        radius: 40,
                        blur: 20,
                        max: 1.0,
                        minOpacity: 0.6,
                        gradient: {0.4: 'blue', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'}
                    }).addTo(map);
                    
                    // Força o redesenho imediato
                    setTimeout(() => { map.invalidateSize(); }, 300);
                    console.log("🔥 Mapa de calor desenhado com " + pontos.length + " pontos.");
                }
            } else {
                filtrados.forEach(oc => {
                    const cor = oc.tags === 'reclamacao' ? '#ff5252' : oc.tags === 'sugestao' ? '#ffb300' : '#4caf50';
                    const marker = L.circleMarker([oc.latitude, oc.longitude], {
                        radius: 10, fillColor: cor, color: '#fff', weight: 2, fillOpacity: 0.8
                    });
                    
                    const fotoUrl = `${API_URL}/api/files/${oc.collectionId}/${oc.id}/${oc.foto}`;
                    marker.bindPopup(`<b>${oc.tags.toUpperCase()}</b><br>${oc.texto}<br><img src="${fotoUrl}" style="width:100%;margin-top:5px;border-radius:5px;">`);
                    camadaMarcadores.addLayer(marker);
                });
            }
        }

        function renderizarRanking() {
            const c = { reclamacao: 0, sugestao: 0, elogio: 0 };
            todasOcorrencias.forEach(oc => { if(c[oc.tags] !== undefined) c[oc.tags]++; });
            document.getElementById('rankingList').innerHTML = `
                <div class="ranking-item"><span>👎 Reclamações</span><span class="ranking-count">${c.reclamacao}</span></div>
                <div class="ranking-item"><span>💡 Sugestões</span><span class="ranking-count">${c.sugestao}</span></div>
                <div class="ranking-item"><span>👍 Elogios</span><span class="ranking-count">${c.elogio}</span></div>
            `;
        }

        function renderizarGrafico() {
            const res = todasOcorrencias.filter(o => o.status === 'resolvido').length;
            const pen = todasOcorrencias.length - res;
            if (chartStatus) chartStatus.destroy();
            chartStatus = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Resolvido', 'Pendente'],
                    datasets: [{ data: [res, pen], backgroundColor: ['#2e7d32', '#ff5252'] }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        document.getElementById('btnHeatmap').onclick = function() {
            modoHeatmap = !modoHeatmap;
            this.innerText = modoHeatmap ? "📍 Ver Marcadores" : "🔥 Ver Mapa de Calor";
            renderizarMapa();
        };

        document.getElementById('btnRefresh').onclick = carregarDados;
        document.querySelectorAll('.filter-check').forEach(c => c.onchange = renderizarMapa);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('pt-BR'); }, 1000);

        init();
    </script>
</body>
</html>
